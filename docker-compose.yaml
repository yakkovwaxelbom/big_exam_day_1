services:

  mysql:
    image: mysql:8.0
    container_name: mysql-server
    restart: unless-stopped

    ports:
      -'3306:3306'

    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: dev

    volumes: 
      - ./sql:/docker-entrypoint-initdb.b

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 90s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch-platinum:8.12.0
    container_name: elasticsearch-server
    environment:
      - "discovery.type=single-node"
      - xpack.security.enabled=false
    ports:
      - 9200:9200
    volumes:
      - es_data:/usr/share/elasticsearch/data


  attack-server:
    build:
      context: ./attack_server
      dockerfile: .

    container_name: attack-server
    environment:
      # BOOTSTRAP_SERVERS: 
      MYSQL_HOST: mysql
      MYSQL_PORT: '3306'





volumes:
  es_data:
    driver: local